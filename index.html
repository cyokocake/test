<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カードバトル - 2人対戦ゲーム</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <!-- ゲームタイトル -->
        <div class="game-header">
            <h1>⚔️ カードバトル ⚔️</h1>
            <p class="subtitle">2人対戦型カードゲーム</p>
        </div>

        <!-- ゲーム状態表示 -->
        <div class="game-status">
            <div class="status-message" id="statusMessage">ゲーム準備中...</div>
            <div class="turn-indicator" id="turnIndicator"></div>
        </div>

        <!-- ゲーム盤面 -->
        <div class="game-board">
            <!-- プレイヤー1（上）-->
            <div class="player-section player-top">
                <div class="player-info">
                    <h2 class="player-name">🎮 プレイヤー1</h2>
                    <div class="health-bar-container">
                        <div class="health-bar" id="player1Health" style="width: 100%">
                            <span class="health-text" id="player1HealthText">100/100</span>
                        </div>
                    </div>
                </div>

                <!-- プレイヤー1のフィールド -->
                <div class="field-container">
                    <h3>フィールド</h3>
                    <div class="field" id="player1Field"></div>
                </div>

                <!-- プレイヤー1の手札 -->
                <div class="hand-container">
                    <h3>手札</h3>
                    <div class="hand" id="player1Hand"></div>
                </div>
            </div>

            <!-- 中央の情報 -->
            <div class="center-info">
                <div class="turn-number" id="turnNumber">ターン: 1</div>
                <button class="end-turn-btn" id="endTurnBtn" onclick="endTurn()">ターン終了</button>
                <button class="restart-btn" onclick="restartGame()">ゲーム開始</button>
            </div>

            <!-- プレイヤー2（下）-->
            <div class="player-section player-bottom">
                <div class="player-info">
                    <h2 class="player-name">🎮 プレイヤー2</h2>
                    <div class="health-bar-container">
                        <div class="health-bar" id="player2Health" style="width: 100%">
                            <span class="health-text" id="player2HealthText">100/100</span>
                        </div>
                    </div>
                </div>

                <!-- プレイヤー2のフィールド -->
                <div class="field-container">
                    <h3>フィールド</h3>
                    <div class="field" id="player2Field"></div>
                </div>

                <!-- プレイヤー2の手札 -->
                <div class="hand-container">
                    <h3>手札</h3>
                    <div class="hand" id="player2Hand"></div>
                </div>
            </div>
        </div>

        <!-- ゲーム履歴・ログ -->
        <div class="game-log">
            <h3>ゲームログ</h3>
            <div class="log-content" id="gameLog"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
